<div class="result-wrapper">
  <!-- Confetti particles -->
  <div class="confetti-container" aria-hidden="true">
    @for (p of confettiParticles; track $index) {
      <div class="confetti-piece" [style]="p"></div>
    }
  </div>

  <div class="result-card glass">
    <!-- Score header -->
    <div class="score-section">
      <div class="score-ring perfect">
        <span class="score-num">3</span>
        <span class="score-sep">/</span>
        <span class="score-den">3</span>
      </div>
      <div class="score-text">
        <h1 class="result-title">🎉 Perfect Score!</h1>
        <p class="result-subtitle">
          You answered <strong>3</strong> of <strong>3</strong> challenges correctly.
        </p>
      </div>
    </div>

    <!-- Actions -->
    <div class="action-row">
      <button id="btn-restart" class="btn btn-primary" (click)="restart()">🔄 New Challenge</button>
      <button id="btn-home" class="btn btn-ghost" (click)="goHome()">← Back to Home</button>
    </div>
  </div>
</div>
